name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/bwets.Markdig.Extensions.slnx

      - name: Build
        run: dotnet build src/bwets.Markdig.Extensions.slnx -c Release --no-restore -p:BuildNumber=${{ github.run_number }}

      - name: Pack
        run: dotnet pack src/bwets.Markdig.Extensions/bwets.Markdig.Extensions.csproj -c Release --no-build -o ./artifacts -p:BuildNumber=${{ github.run_number }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: ./artifacts/*

  # Publish to NuGet on every push to main, version 0.1.<run_number>,
  # using NuGet Trusted Publishing (OIDC) in the "release" environment.
  publish:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: nupkg
          path: ./artifacts

      - name: NuGet login (OIDC -> short-lived API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: NuGet push
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
